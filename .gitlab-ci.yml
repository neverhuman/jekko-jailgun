# timeout-minutes: 20
# permissions: contents: read
# concurrency: split-family-child
# rust image meets the ported jailgun MSRV (rust-version = 1.95)
image: rust:1.95

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

default:
  timeout: 20m
  interruptible: true

stages:
  - fast
  - check
  - test
  - typecheck
  - build
  - node
  - security
  - jankurai

fast:
  stage: fast
  resource_group: "$CI_PROJECT_PATH_SLUG-$CI_COMMIT_REF_SLUG"
  script: ["bash ops/ci/fast.sh"]

check:
  stage: check
  resource_group: "$CI_PROJECT_PATH_SLUG-$CI_COMMIT_REF_SLUG"
  script: ["bash ops/ci/check.sh"]

test:
  stage: test
  resource_group: "$CI_PROJECT_PATH_SLUG-$CI_COMMIT_REF_SLUG"
  script: ["bash ops/ci/test.sh"]

typecheck:
  stage: typecheck
  resource_group: "$CI_PROJECT_PATH_SLUG-$CI_COMMIT_REF_SLUG"
  script: ["bash ops/ci/typecheck.sh"]

build:
  stage: build
  resource_group: "$CI_PROJECT_PATH_SLUG-$CI_COMMIT_REF_SLUG"
  script: ["bash ops/ci/build.sh"]

node:
  stage: node
  image: node:22
  resource_group: "$CI_PROJECT_PATH_SLUG-$CI_COMMIT_REF_SLUG"
  script: ["bash ops/ci/node.sh"]

security:
  stage: security
  resource_group: "$CI_PROJECT_PATH_SLUG-$CI_COMMIT_REF_SLUG"
  script: ["bash ops/ci/security.sh"]

jankurai:
  stage: jankurai
  resource_group: "$CI_PROJECT_PATH_SLUG-$CI_COMMIT_REF_SLUG"
  script: ["bash ops/ci/jankurai.sh"]
