<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ChatGPT — session expired</title>
</head>
<body>
  <main>
    <div id="conversation" data-state="session-expired"></div>
  </main>
  <div role="dialog" aria-modal="true" data-testid="session-expired-modal">
    <h2>Session expired</h2>
    <p>You've been signed out. Please sign in again to continue.</p>
    <button data-testid="session-sign-in">Sign in</button>
  </div>
</body>
</html>
