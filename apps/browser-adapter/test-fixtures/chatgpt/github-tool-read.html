<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ChatGPT — GitHub read tool prompt</title>
</head>
<body>
  <main>
    <div id="conversation" data-state="tool-prompt">
      <article data-message-author-role="assistant">
        <p>I'd like to use the GitHub tool to read repository files.</p>
        <section data-tool="github" data-action="read">
          <p>GitHub Read — allow this action?</p>
          <button>Allow</button>
        </section>
      </article>
    </div>
  </main>
</body>
</html>
