<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ChatGPT — assistant done, no tar</title>
</head>
<body>
  <main>
    <div id="conversation" data-state="done">
      <article data-message-author-role="user">
        <p>Summarise the repo.</p>
      </article>
      <article data-message-author-role="assistant">
        <p>Here is the summary you requested.</p>
        <div role="toolbar" aria-label="Final actions">
          <button aria-label="Copy response">Copy response</button>
          <button aria-label="Good response">Good response</button>
          <button aria-label="Bad response">Bad response</button>
          <button aria-label="Sources">Sources</button>
        </div>
      </article>
    </div>
  </main>
</body>
</html>
