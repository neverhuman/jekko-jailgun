<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ChatGPT — idle composer</title>
</head>
<body>
  <main>
    <div id="conversation" data-state="idle">
      <p>Start a new conversation.</p>
    </div>
    <form>
      <textarea id="prompt-textarea" data-testid="composer-text-input" aria-label="Message ChatGPT"></textarea>
      <button data-testid="send-button" aria-label="Send message" disabled>Send</button>
    </form>
  </main>
</body>
</html>
