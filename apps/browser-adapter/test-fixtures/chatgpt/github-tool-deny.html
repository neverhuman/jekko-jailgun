<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ChatGPT — GitHub Create Tree tool prompt</title>
</head>
<body>
  <main>
    <div id="conversation" data-state="tool-prompt">
      <article data-message-author-role="assistant">
        <p>I want to use the GitHub tool to create a tree and commit changes.</p>
        <section data-tool="github" data-action="create-tree">
          <p>GitHub Create Tree — allow this action?</p>
          <button>Deny</button>
          <button>Allow</button>
        </section>
      </article>
    </div>
  </main>
</body>
</html>
