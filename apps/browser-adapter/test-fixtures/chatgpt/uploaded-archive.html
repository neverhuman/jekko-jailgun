<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ChatGPT — uploaded archive ready</title>
</head>
<body>
  <main>
    <div id="conversation" data-state="uploaded"></div>
    <form>
      <div data-testid="upload-chip" aria-label="Attached source.tar(289).gz">
        <span class="attachment-name">source.tar(289).gz</span>
        <button type="button" aria-label="Remove attachment">Remove</button>
        <span data-state="ready">Attached</span>
      </div>
      <textarea id="prompt-textarea" data-testid="composer-text-input">Please analyse this archive.</textarea>
      <button data-testid="send-button" aria-label="Send message">Send</button>
    </form>
  </main>
</body>
</html>
