<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ChatGPT — composer has prompt</title>
</head>
<body>
  <main>
    <div id="conversation" data-state="composing"></div>
    <form>
      <textarea id="prompt-textarea" data-testid="composer-text-input">Please analyse this archive.</textarea>
      <button data-testid="send-button" aria-label="Send message">Send</button>
    </form>
  </main>
</body>
</html>
