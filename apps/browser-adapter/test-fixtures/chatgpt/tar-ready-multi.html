<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ChatGPT — assistant produced multiple tars</title>
</head>
<body>
  <main>
    <div id="conversation" data-state="tar-ready">
      <article data-message-author-role="user">
        <p>Please produce the archives.</p>
      </article>
      <article data-message-author-role="assistant">
        <p>Three candidate archives are below. Pick by name.</p>
        <ul>
          <li>
            <a
              href="https://files.example.invalid/jekko.tar.gz"
              download="jekko.tar.gz"
              aria-label="Download jekko.tar.gz"
            >Download jekko.tar.gz</a>
          </li>
          <li>
            <a
              href="https://files.example.invalid/jekko-fixes.tar.gz"
              download="jekko-fixes.tar.gz"
              aria-label="Download jekko-fixes.tar.gz"
            >Download jekko-fixes.tar.gz</a>
          </li>
          <li>
            <a
              href="https://files.example.invalid/dummy.tar.gz"
              download="dummy.tar.gz"
              aria-label="Download dummy.tar.gz"
            >Download dummy.tar.gz</a>
          </li>
        </ul>
      </article>
    </div>
  </main>
</body>
</html>
