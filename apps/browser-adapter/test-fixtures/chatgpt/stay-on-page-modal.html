<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ChatGPT — stay on page confirm</title>
</head>
<body>
  <main>
    <div id="conversation" data-state="prompt-leave"></div>
  </main>
  <div role="dialog" aria-modal="true" data-testid="stay-on-page-modal">
    <h2>Leave this page?</h2>
    <p>Changes you've made may not be saved.</p>
    <button data-testid="stay-on-page-leave">Leave</button>
    <button data-testid="stay-on-page-stay">Stay on this page</button>
  </div>
</body>
</html>
