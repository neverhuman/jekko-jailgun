# Generated source zones ported with the jailgun product surface.
# `agent/repo-score.json` and `agent/repo-score.md` remain tracked audit
# evidence refreshed by `bash ops/ci/jankurai.sh`.
schema_version = 1

[[zone]]
path = "Cargo.lock"
source = "Cargo.toml"
generator = "cargo"
command = "cargo generate-lockfile"
read_only = true
write_policy = "generator-only"

[[zone]]
path = "package-lock.json"
source = "package.json"
generator = "npm"
command = "npm install --package-lock-only"
read_only = true
write_policy = "generator-only"

[[zone]]
path = "contracts/json-schema/event.schema.json"
source = "contracts/json-schema/event.schema.json"
generator = "scripts/generate-contracts.mjs"
command = "bash ops/jailgun/ci/contracts.sh --write"
read_only = true
write_policy = "generator-only"

[[zone]]
path = "contracts/fixtures/events/"
source = "contracts/fixtures/events/"
generator = "scripts/generate-contracts.mjs"
command = "bash ops/jailgun/ci/contracts.sh --write"
read_only = true
write_policy = "generator-only"
